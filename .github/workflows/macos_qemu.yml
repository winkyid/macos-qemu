name: MacOS QEMU on Linux

on: 
  workflow_dispatch:

jobs:
  macos-qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM & Install Tools
        run: |
          # Cek KVM Support
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          sudo chmod 666 /dev/kvm
          
      - name: Install Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Run MacOS Docker-OSX
        run: |
          # Jalankan Docker-OSX (Monterey)
          # Port 5900 adalah VNC, Port 22 adalah SSH
          docker run -d \
            --device /dev/kvm \
            -p 5900:5900 \
            -p 10022:22 \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            -e "RAM=4" \
            sickcodes/docker-osx:monterey

      - name: Start Tunnel & Get Address
        run: |
          # Tunnel untuk VNC
          nohup ngrok tcp 5900 --region jp &
          sleep 10
          echo "==============================================="
          echo "ALAMAT VNC ANDA:"
          curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "==============================================="

      - name: 10 Minute Session
        run: |
          echo "Mesin menyala. Silakan konek."
          sleep 600
